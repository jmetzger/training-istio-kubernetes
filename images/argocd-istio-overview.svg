<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="'Segoe UI', 'Helvetica Neue', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#1a2a3a"/>
    </linearGradient>
    <linearGradient id="gitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="argoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef6b2e"/>
      <stop offset="100%" style="stop-color:#d45a1f"/>
    </linearGradient>
    <linearGradient id="k8sGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#326ce5"/>
      <stop offset="100%" style="stop-color:#2558c0"/>
    </linearGradient>
    <linearGradient id="istioGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#466bb0"/>
      <stop offset="100%" style="stop-color:#3a5a95"/>
    </linearGradient>
    <linearGradient id="devGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.3" flood-color="#000"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ade80"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f87171"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="550" y="48" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="700" letter-spacing="1">ArgoCD + Istio – GitOps-Übersicht</text>
  <line x1="350" y1="60" x2="750" y2="60" stroke="#f97316" stroke-width="2" opacity="0.6"/>

  <!-- ═══════════ DEV / USER BOX ═══════════ -->
  <rect x="40" y="100" width="180" height="200" rx="14" fill="url(#devGrad)" opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="40" y="100" width="180" height="36" rx="14" fill="url(#devGrad)" opacity="0.85"/>
  <text x="130" y="124" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">👤 Developer</text>

  <text x="130" y="165" text-anchor="middle" fill="#94a3b8" font-size="12">git push</text>
  <text x="130" y="185" text-anchor="middle" fill="#94a3b8" font-size="12">Pull Request</text>
  <text x="130" y="205" text-anchor="middle" fill="#94a3b8" font-size="12">Code Review</text>
  <text x="130" y="235" text-anchor="middle" fill="#64748b" font-size="11" font-style="italic">Kein kubectl!</text>

  <!-- ═══════════ GIT REPO BOX ═══════════ -->
  <rect x="290" y="100" width="200" height="200" rx="14" fill="url(#gitGrad)" opacity="0.12" stroke="#f97316" stroke-width="1.5"/>
  <rect x="290" y="100" width="200" height="36" rx="14" fill="url(#gitGrad)" opacity="0.85"/>
  <text x="390" y="124" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">📁 Git Repository</text>

  <text x="390" y="162" text-anchor="middle" fill="#cbd5e1" font-size="11" font-weight="600">Single Source of Truth</text>
  <text x="310" y="188" fill="#94a3b8" font-size="11">├ istio/ (Helm values)</text>
  <text x="310" y="208" fill="#94a3b8" font-size="11">├ policies/ (AuthZ, mTLS)</text>
  <text x="310" y="228" fill="#94a3b8" font-size="11">├ traffic/ (VS, DR)</text>
  <text x="310" y="248" fill="#94a3b8" font-size="11">├ apps/ (Bookinfo …)</text>
  <text x="310" y="268" fill="#94a3b8" font-size="11">└ overlays/ (Env-spezifisch)</text>

  <!-- Arrow Dev → Git -->
  <line x1="220" y1="200" x2="285" y2="200" stroke="#4ade80" stroke-width="2" marker-end="url(#arrowGreen)" stroke-dasharray="6,3"/>
  <text x="252" y="192" text-anchor="middle" fill="#4ade80" font-size="10">push</text>

  <!-- ═══════════ ARGOCD BOX ═══════════ -->
  <rect x="570" y="100" width="220" height="200" rx="14" fill="url(#argoGrad)" opacity="0.12" stroke="#ef6b2e" stroke-width="1.5"/>
  <rect x="570" y="100" width="220" height="36" rx="14" fill="url(#argoGrad)" opacity="0.85"/>
  <text x="680" y="124" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">🔄 ArgoCD</text>

  <text x="600" y="162" fill="#cbd5e1" font-size="11" font-weight="600">Application Controller</text>
  <text x="600" y="185" fill="#94a3b8" font-size="11">• Git Repo überwachen (Poll)</text>
  <text x="600" y="205" fill="#94a3b8" font-size="11">• Soll ↔ Ist vergleichen</text>
  <text x="600" y="225" fill="#94a3b8" font-size="11">• Auto-Sync / Manual Sync</text>
  <text x="600" y="245" fill="#94a3b8" font-size="11">• Drift Detection</text>
  <text x="600" y="265" fill="#94a3b8" font-size="11">• Self-Healing</text>

  <!-- Arrow Git → ArgoCD -->
  <line x1="495" y1="185" x2="565" y2="185" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="530" y="177" text-anchor="middle" fill="#f97316" font-size="10">pull</text>
  <!-- Arrow ArgoCD → Git (watch) -->
  <line x1="565" y1="210" x2="495" y2="210" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrowOrange)" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="530" y="225" text-anchor="middle" fill="#f9731680" font-size="9">watch</text>

  <!-- ═══════════ ARGOCD UI BOX (small) ═══════════ -->
  <rect x="870" y="120" width="180" height="80" rx="10" fill="#ef6b2e10" stroke="#ef6b2e" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="960" y="148" text-anchor="middle" fill="#ef6b2e" font-size="12" font-weight="600">🖥️ ArgoCD Web UI</text>
  <text x="960" y="170" text-anchor="middle" fill="#94a3b8" font-size="10">Sync-Status, Health</text>
  <text x="960" y="186" text-anchor="middle" fill="#94a3b8" font-size="10">Resource Tree, Diff, Rollback</text>

  <line x1="790" y1="160" x2="865" y2="160" stroke="#ef6b2e" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- ═══════════ KUBERNETES CLUSTER ═══════════ -->
  <rect x="290" y="380" width="760" height="300" rx="16" fill="#326ce510" stroke="#326ce5" stroke-width="2"/>
  <rect x="290" y="380" width="760" height="40" rx="16" fill="url(#k8sGrad)" opacity="0.8"/>
  <text x="670" y="406" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">☸ Kubernetes Cluster</text>

  <!-- Arrow ArgoCD → K8s -->
  <path d="M 680 305 L 680 375" stroke="#60a5fa" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="700" y="345" fill="#60a5fa" font-size="11" font-weight="600">sync / apply</text>

  <!-- Drift arrow K8s → ArgoCD -->
  <path d="M 620 375 L 620 305" stroke="#f87171" stroke-width="1.5" fill="none" marker-end="url(#arrowRed)" stroke-dasharray="5,3"/>
  <text x="575" y="345" fill="#f87171" font-size="10">drift detect</text>

  <!-- ── Istiod ── -->
  <rect x="320" y="440" width="190" height="110" rx="12" fill="url(#istioGrad)" opacity="0.15" stroke="#466bb0" stroke-width="1.5"/>
  <rect x="320" y="440" width="190" height="32" rx="12" fill="url(#istioGrad)" opacity="0.8"/>
  <text x="415" y="461" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">⛵ Istiod (Control Plane)</text>
  <text x="335" y="492" fill="#94a3b8" font-size="10">• Pilot (xDS Config Push)</text>
  <text x="335" y="510" fill="#94a3b8" font-size="10">• Citadel (mTLS Certs)</text>
  <text x="335" y="528" fill="#94a3b8" font-size="10">• Galley (Config Validation)</text>

  <!-- ── Istio CRDs ── -->
  <rect x="545" y="440" width="210" height="110" rx="12" fill="url(#istioGrad)" opacity="0.15" stroke="#466bb0" stroke-width="1.5"/>
  <rect x="545" y="440" width="210" height="32" rx="12" fill="url(#istioGrad)" opacity="0.8"/>
  <text x="650" y="461" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">📜 Istio Resources (CRDs)</text>
  <text x="560" y="492" fill="#94a3b8" font-size="10">VirtualService, DestinationRule</text>
  <text x="560" y="510" fill="#94a3b8" font-size="10">AuthorizationPolicy, PeerAuthn</text>
  <text x="560" y="528" fill="#94a3b8" font-size="10">Gateway, EnvoyFilter, WasmPlugin</text>

  <!-- ── Workloads ── -->
  <rect x="790" y="440" width="230" height="110" rx="12" fill="#22c55e10" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="790" y="440" width="230" height="32" rx="12" fill="url(#devGrad)" opacity="0.7"/>
  <text x="905" y="461" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">📦 Workloads + Sidecars</text>
  <text x="805" y="492" fill="#94a3b8" font-size="10">Bookinfo (productpage, reviews …)</text>
  <text x="805" y="510" fill="#94a3b8" font-size="10">Envoy Sidecar / ztunnel</text>
  <text x="805" y="528" fill="#94a3b8" font-size="10">App-Deployments, Services</text>

  <!-- Connections inside cluster -->
  <line x1="510" y1="495" x2="540" y2="495" stroke="#466bb080" stroke-width="1.5"/>
  <line x1="755" y1="495" x2="785" y2="495" stroke="#466bb080" stroke-width="1.5"/>

  <!-- ── Data Plane Bar ── -->
  <rect x="320" y="575" width="700" height="36" rx="8" fill="#466bb015" stroke="#466bb0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="670" y="598" text-anchor="middle" fill="#7ea3d4" font-size="12" font-weight="600">🔒 Data Plane – mTLS verschlüsselter Traffic zwischen Services</text>

  <!-- ═══════════ BENEFITS SIDEBAR ═══════════ -->
  <rect x="40" y="380" width="220" height="300" rx="14" fill="#f8fafc08" stroke="#475569" stroke-width="1"/>
  <text x="150" y="408" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="700">✅ Vorteile</text>
  <line x1="60" y1="418" x2="240" y2="418" stroke="#475569" stroke-width="0.5"/>
  <text x="60" y="443" fill="#4ade80" font-size="11">✔ Git = Audit-Log</text>
  <text x="60" y="467" fill="#4ade80" font-size="11">✔ Rollback per git revert</text>
  <text x="60" y="491" fill="#4ade80" font-size="11">✔ Drift Detection</text>
  <text x="60" y="515" fill="#4ade80" font-size="11">✔ Self-Healing</text>
  <text x="60" y="539" fill="#4ade80" font-size="11">✔ PR-basierter Review</text>
  <text x="60" y="563" fill="#4ade80" font-size="11">✔ Multi-Cluster fähig</text>
  <text x="60" y="587" fill="#4ade80" font-size="11">✔ Helm &amp; Kustomize nativ</text>
  <text x="60" y="611" fill="#4ade80" font-size="11">✔ Web UI für Überblick</text>
  <text x="60" y="648" fill="#f87171" font-size="11">✘ Kein manuelles kubectl</text>
  <text x="60" y="666" fill="#f87171" font-size="11">✘ Kein Drift im Cluster</text>

  <!-- Footer -->
  <text x="550" y="705" text-anchor="middle" fill="#475569" font-size="10">ArgoCD + Istio GitOps Architektur – T3 Company Training</text>
</svg>
